<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Finanzas</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f3;
      --bg-tertiary: #eeede8;
      --text-primary: #1a1a18;
      --text-secondary: #6b6b67;
      --text-tertiary: #9e9e9a;
      --border: rgba(0,0,0,0.12);
      --border-md: rgba(0,0,0,0.22);
      --radius-md: 8px;
      --radius-lg: 12px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #1c1c1a;
        --bg-secondary: #252523;
        --bg-tertiary: #2e2e2b;
        --text-primary: #f0efe9;
        --text-secondary: #9e9e9a;
        --text-tertiary: #6b6b67;
        --border: rgba(255,255,255,0.1);
        --border-md: rgba(255,255,255,0.2);
      }
    }

    body {
      font-family: var(--font);
      background: var(--bg-tertiary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 1.5rem 1rem 3rem;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .header h1 { font-size: 22px; font-weight: 500; }
    .header p { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 2px;
      border-bottom: 0.5px solid var(--border);
      margin-bottom: 1.5rem;
      overflow-x: auto;
    }
    .tab {
      padding: 9px 18px;
      font-size: 14px;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text-secondary);
      border-bottom: 2px solid transparent;
      margin-bottom: -0.5px;
      white-space: nowrap;
      font-family: var(--font);
    }
    .tab.active { color: var(--text-primary); border-bottom: 2px solid var(--text-primary); font-weight: 500; }

    /* Cards */
    .card {
      background: var(--bg-primary);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      margin-bottom: 1.25rem;
    }

    /* Metrics */
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 1.25rem;
    }
    .metric {
      border-radius: var(--radius-md);
      padding: 14px;
    }
    .metric-neutral { background: var(--bg-secondary); }
    .metric-income { background: #EAF3DE; }
    .metric-expense { background: #FAECE7; }
    .metric-positive { background: #E1F5EE; }
    .metric-negative { background: #FCEBEB; }
    .metric-label { font-size: 12px; margin-bottom: 6px; }
    .metric-neutral .metric-label { color: var(--text-secondary); }
    .metric-income .metric-label { color: #3B6D11; }
    .metric-expense .metric-label { color: #993C1D; }
    .metric-positive .metric-label { color: #0F6E56; }
    .metric-negative .metric-label { color: #A32D2D; }
    .metric-value { font-size: 18px; font-weight: 500; }
    .metric-neutral .metric-value { color: var(--text-primary); }
    .metric-income .metric-value { color: #27500A; }
    .metric-expense .metric-value { color: #712B13; }
    .metric-positive .metric-value { color: #085041; }
    .metric-negative .metric-value { color: #791F1F; }
    .metric-sub { font-size: 11px; margin-top: 3px; color: var(--text-tertiary); }

    /* Section title */
    .section-title {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* Charts */
    .chart-wrap { position: relative; width: 100%; height: 260px; margin-bottom: 1.25rem; }
    .chart-wrap-sm { position: relative; width: 100%; height: 200px; margin-bottom: 1.25rem; }

    /* Balance bar */
    .balance-bar-wrap {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      padding: 14px;
      margin-bottom: 1.25rem;
    }
    .balance-bar-track { height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; margin: 8px 0; }
    .balance-bar-fill { height: 100%; border-radius: 5px; transition: width 0.4s; }
    .balance-bar-labels { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-secondary); }

    /* Two col */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    /* Month selector */
    .month-selector { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; }
    .month-btn {
      background: none;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 5px 14px;
      cursor: pointer;
      font-size: 16px;
      color: var(--text-secondary);
      font-family: var(--font);
    }
    .month-btn:hover { background: var(--bg-secondary); }
    .month-label { font-size: 15px; font-weight: 500; color: var(--text-primary); min-width: 140px; text-align: center; }

    /* Legend */
    .legend-row { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 10px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-secondary); }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

    /* Type toggle */
    .type-toggle {
      display: flex;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
      margin-bottom: 1rem;
    }
    .type-btn { flex: 1; padding: 10px; font-size: 14px; cursor: pointer; border: none; background: none; color: var(--text-secondary); font-family: var(--font); }
    .type-btn.active-expense { background: #FAECE7; color: #712B13; font-weight: 500; }
    .type-btn.active-income { background: #EAF3DE; color: #27500A; font-weight: 500; }

    /* Form */
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label { font-size: 12px; color: var(--text-secondary); }
    .form-group input, .form-group select {
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border);
      padding: 9px 11px;
      font-size: 14px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-family: var(--font);
      outline: none;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--border-md); }

    /* Buttons */
    .btn-primary {
      background: var(--text-primary);
      color: var(--bg-primary);
      border: none;
      border-radius: var(--radius-md);
      padding: 10px 22px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
      font-family: var(--font);
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-secondary {
      background: none;
      color: var(--text-secondary);
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius-md);
      padding: 10px 18px;
      font-size: 14px;
      cursor: pointer;
      font-family: var(--font);
    }
    .btn-secondary:hover { background: var(--bg-secondary); }

    /* Expense items */
    .expense-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 14px;
      background: var(--bg-primary);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      margin-bottom: 6px;
    }
    .expense-left { display: flex; align-items: center; gap: 10px; }
    .expense-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .expense-name { font-size: 14px; color: var(--text-primary); }
    .expense-cat { font-size: 12px; color: var(--text-secondary); }
    .amt-neg { font-size: 15px; font-weight: 500; color: #D85A30; }
    .amt-pos { font-size: 15px; font-weight: 500; color: #1D9E75; }
    .expense-date { font-size: 11px; color: var(--text-tertiary); text-align: right; }
    .delete-btn { background: none; border: none; cursor: pointer; color: var(--text-tertiary); font-size: 17px; padding: 2px 6px; line-height: 1; }
    .delete-btn:hover { color: #E24B4A; }

    /* Filter chips */
    .filter-row { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
    .filter-chip {
      font-size: 12px;
      padding: 5px 14px;
      border-radius: 20px;
      border: 0.5px solid var(--border);
      cursor: pointer;
      background: none;
      color: var(--text-secondary);
      font-family: var(--font);
    }
    .filter-chip.active { background: var(--text-primary); color: var(--bg-primary); border-color: transparent; }

    /* Range selector */
    .range-selector { display: flex; gap: 4px; }
    .range-btn {
      font-size: 12px;
      padding: 5px 14px;
      border-radius: 20px;
      border: 0.5px solid var(--border);
      cursor: pointer;
      background: none;
      color: var(--text-secondary);
      font-family: var(--font);
    }
    .range-btn.active { background: var(--text-primary); color: var(--bg-primary); border-color: transparent; }

    /* Category cards grid */
    .cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; margin-bottom: 1.25rem; }
    .cat-card {
      background: var(--bg-primary);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px;
    }
    .cat-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .cat-card-title { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 500; color: var(--text-primary); }
    .cat-dot { width: 10px; height: 10px; border-radius: 50%; }
    .cat-card-total { font-size: 12px; color: var(--text-secondary); }

    /* Variation table */
    .var-table { border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
    .var-table table { width: 100%; font-size: 13px; border-collapse: collapse; }
    .var-table th { padding: 10px 14px; text-align: left; font-weight: 500; color: var(--text-secondary); background: var(--bg-secondary); }
    .var-table td { padding: 10px 14px; border-top: 0.5px solid var(--border); }

    /* Empty state */
    .empty-state { text-align: center; padding: 2.5rem 1rem; color: var(--text-tertiary); font-size: 14px; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text-primary);
      color: var(--bg-primary);
      padding: 10px 20px;
      border-radius: var(--radius-md);
      font-size: 14px;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 1000;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 600px) {
      .form-row, .form-row-3, .two-col { grid-template-columns: 1fr; }
      .cat-grid { grid-template-columns: 1fr; }
      .header { flex-direction: column; align-items: flex-start; gap: 10px; }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div>
      <h1>Mis finanzas</h1>
      <p>Ingresos · Gastos · Evolución</p>
    </div>
    <button class="btn-primary" onclick="switchTab('add')">+ Agregar</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('resumen')">Resumen</button>
    <button class="tab" onclick="switchTab('evolucion')">Evolución</button>
    <button class="tab" onclick="switchTab('variacion')">Variación</button>
    <button class="tab" onclick="switchTab('detalle')">Detalle</button>
    <button class="tab" onclick="switchTab('add')">Agregar</button>
  </div>

  <!-- RESUMEN -->
  <div id="view-resumen">
    <div class="month-selector">
      <button class="month-btn" onclick="changeMonth(-1)">&#8592;</button>
      <span class="month-label" id="month-label"></span>
      <button class="month-btn" onclick="changeMonth(1)">&#8594;</button>
    </div>
    <div class="metric-grid" id="metrics-grid"></div>
    <div class="balance-bar-wrap" id="balance-bar"></div>
    <p class="section-title">Distribución de gastos</p>
    <div class="two-col">
      <div>
        <div class="legend-row" id="pie-legend"></div>
        <div style="position:relative;height:200px;"><canvas id="pieChart"></canvas></div>
      </div>
      <div>
        <div style="position:relative;height:220px;"><canvas id="barChart"></canvas></div>
      </div>
    </div>
  </div>

  <!-- EVOLUCIÓN -->
  <div id="view-evolucion" style="display:none;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;">
      <p class="section-title" style="margin:0;">Evolución mensual</p>
      <div class="range-selector">
        <button class="range-btn active" onclick="setRange(6,this)">6 meses</button>
        <button class="range-btn" onclick="setRange(9,this)">9 meses</button>
        <button class="range-btn" onclick="setRange(12,this)">12 meses</button>
      </div>
    </div>
    <p class="section-title">Ingresos · Gastos totales · Balance</p>
    <div class="legend-row">
      <span class="legend-item"><span class="legend-dot" style="background:#1D9E75"></span>Ingresos</span>
      <span class="legend-item"><span class="legend-dot" style="background:#D85A30"></span>Gastos totales</span>
      <span class="legend-item"><span class="legend-dot" style="background:#3266ad"></span>Balance</span>
    </div>
    <div class="chart-wrap"><canvas id="evoGlobalChart"></canvas></div>
    <p class="section-title">Por categoría de gasto</p>
    <div class="cat-grid" id="cat-cards"></div>
  </div>

  <!-- VARIACIÓN -->
  <div id="view-variacion" style="display:none;">
    <p class="section-title">Ingresos vs gastos — últimos 6 meses</p>
    <div class="legend-row">
      <span class="legend-item"><span class="legend-dot" style="background:#1D9E75"></span>Ingresos</span>
      <span class="legend-item"><span class="legend-dot" style="background:#D85A30"></span>Gastos</span>
      <span class="legend-item"><span class="legend-dot" style="background:#3266ad"></span>Balance</span>
    </div>
    <div class="chart-wrap"><canvas id="lineChart"></canvas></div>
    <p class="section-title">Balance mensual</p>
    <div class="chart-wrap-sm"><canvas id="balanceBarChart"></canvas></div>
    <div class="var-table" id="variacion-table"></div>
  </div>

  <!-- DETALLE -->
  <div id="view-detalle" style="display:none;">
    <div class="month-selector">
      <button class="month-btn" onclick="changeMonthD(-1)">&#8592;</button>
      <span class="month-label" id="month-label-d"></span>
      <button class="month-btn" onclick="changeMonthD(1)">&#8594;</button>
    </div>
    <div class="filter-row" id="filter-cats"></div>
    <div id="expenses-list"></div>
  </div>

  <!-- AGREGAR -->
  <div id="view-add" style="display:none;">
    <div class="card">
      <p class="section-title" style="margin-bottom:1rem;">Nuevo registro</p>
      <div class="type-toggle">
        <button class="type-btn active-expense" id="btn-gasto" onclick="setType('gasto')">Gasto</button>
        <button class="type-btn" id="btn-ingreso" onclick="setType('ingreso')">Ingreso</button>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Descripción</label><input type="text" id="desc" placeholder="ej: Sueldo mensual"></div>
        <div class="form-group"><label>Monto ($)</label><input type="number" id="amount" placeholder="0.00" step="0.01" min="0"></div>
      </div>
      <div class="form-row-3">
        <div class="form-group"><label>Categoría</label><select id="cat-select" onchange="updateSubcats()"><option value="">Seleccionar...</option></select></div>
        <div class="form-group"><label>Subcategoría</label><select id="subcat-select"><option value="">Seleccionar categoría</option></select></div>
        <div class="form-group"><label>Fecha</label><input type="date" id="date-input"></div>
      </div>
      <div class="form-group" style="margin-bottom:16px;"><label>Nota (opcional)</label><input type="text" id="note" placeholder="Alguna nota adicional..."></div>
      <div style="display:flex;gap:10px;">
        <button class="btn-primary" onclick="addEntry()">Guardar</button>
        <button class="btn-secondary" onclick="switchTab('resumen')">Cancelar</button>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const SUBCATS_GASTO = {
  Casa:['Alquiler/Hipoteca','Mantenimiento','Limpieza','Decoración','Otros'],
  Facturas:['Electricidad','Agua','Gas','Internet','Teléfono','Otros'],
  Compras:['Ropa','Electrónica','Libros','Otros artículos'],
  Comida:['Supermercado','Almacén','Verdulería','Carnicería','Otros'],
  Salud:['Higiene personal','Remedios','Médico','Otros'],
  Regalos:['Cumpleaños','Otros'],
  Transporte:['Auto','Colectivo/Subte','Taxi/Uber','Bicicleta','Otros'],
  Entretenimiento:['Restaurante','Citas o salidas','Cine/Teatro','Streaming','Otros'],
  Deportes:['Cuota gimnasio','Equipamiento','Clases','Otros'],
  Viajes:['Vuelos','Hotel','Comida viaje','Actividades','Otros']
};
const SUBCATS_INGRESO = {
  Salario:['Sueldo fijo','Aguinaldo','Bono','Otros'],
  'Nuevos ingresos':['Freelance','Venta','Inversión','Alquiler cobrado','Otros']
};
const CAT_COLORS = {
  Casa:'#3266ad',Facturas:'#1D9E75',Compras:'#D85A30',Comida:'#BA7517',
  Salud:'#D4537E',Regalos:'#7F77DD',Transporte:'#888780',
  Entretenimiento:'#378ADD',Deportes:'#639922',Viajes:'#E24B4A',
  Salario:'#1D9E75','Nuevos ingresos':'#5DCAA5'
};
const MONTHS_ES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const ALL_GASTO_CATS = Object.keys(SUBCATS_GASTO);

const STORAGE_KEY = 'finanzas_app_v1';
function loadData(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); }catch(e){ return []; } }
function saveData(d){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }catch(e){} }

const now = new Date();
let viewMonth = now.getMonth(), viewYear = now.getFullYear();
let detailMonth = now.getMonth(), detailYear = now.getFullYear();
let activeFilter = 'Todos', currentType = 'gasto', evoRange = 6;
let data = loadData();

let pieInst, barInst, lineInst, balanceBarInst, evoGlobalInst;
const catChartInsts = {};

function getMonthData(mo, yr){
  return data.filter(e => {
    const d = new Date(e.date + 'T00:00:00');
    return d.getMonth() === mo && d.getFullYear() === yr;
  });
}

function fmtMoney(n){ return '$' + Math.round(n).toLocaleString('es-AR'); }

function getMonthsBack(n){
  const arr = [];
  for(let i = n-1; i >= 0; i--){
    let mo = now.getMonth() - i, yr = now.getFullYear();
    if(mo < 0){ mo += 12; yr--; }
    arr.push({mo, yr});
  }
  return arr;
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

/* ── RESUMEN ── */
function renderMetrics(){
  const md = getMonthData(viewMonth, viewYear);
  const ingresos = md.filter(e=>e.type==='ingreso').reduce((s,e)=>s+e.amount,0);
  const gastos = md.filter(e=>e.type==='gasto').reduce((s,e)=>s+e.amount,0);
  const balance = ingresos - gastos;
  const pct = ingresos > 0 ? Math.round((gastos/ingresos)*100) : 0;
  const cls = balance >= 0 ? 'metric-positive' : 'metric-negative';
  document.getElementById('metrics-grid').innerHTML = `
    <div class="metric metric-income"><div class="metric-label">Ingresos</div><div class="metric-value">${fmtMoney(ingresos)}</div><div class="metric-sub">${md.filter(e=>e.type==='ingreso').length} registros</div></div>
    <div class="metric metric-expense"><div class="metric-label">Gastos</div><div class="metric-value">${fmtMoney(gastos)}</div><div class="metric-sub">${md.filter(e=>e.type==='gasto').length} registros</div></div>
    <div class="metric ${cls}"><div class="metric-label">Balance</div><div class="metric-value">${balance>=0?'+':''}${fmtMoney(balance)}</div><div class="metric-sub">${pct}% gastado</div></div>
    <div class="metric metric-neutral"><div class="metric-label">Disponible</div><div class="metric-value">${fmtMoney(Math.max(0,balance))}</div><div class="metric-sub">${balance<0?'Déficit':'Superávit'}</div></div>`;
  const pctSafe = Math.min(pct, 100);
  const barColor = pct > 100 ? '#E24B4A' : pct > 80 ? '#BA7517' : '#1D9E75';
  document.getElementById('balance-bar').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
      <span style="font-size:13px;color:var(--text-secondary);">Uso del ingreso</span>
      <span style="font-size:13px;font-weight:500;color:var(--text-primary);">${pct}%</span>
    </div>
    <div class="balance-bar-track"><div class="balance-bar-fill" style="width:${pctSafe}%;background:${barColor};"></div></div>
    <div class="balance-bar-labels"><span>${fmtMoney(gastos)} gastados</span><span>${fmtMoney(ingresos)} ingresados</span></div>`;
}

function renderPieChart(){
  const md = getMonthData(viewMonth, viewYear).filter(e=>e.type==='gasto');
  const bycat = {};
  md.forEach(e=>{ bycat[e.cat] = (bycat[e.cat]||0) + e.amount; });
  const cats = Object.keys(bycat).sort((a,b)=>bycat[b]-bycat[a]);
  const total = cats.reduce((s,c)=>s+bycat[c], 0);
  document.getElementById('pie-legend').innerHTML = cats.map(c =>
    `<span class="legend-item"><span class="legend-dot" style="background:${CAT_COLORS[c]}"></span>${c} ${total>0?Math.round(bycat[c]/total*100)+'%':''}</span>`).join('');
  if(pieInst) pieInst.destroy();
  if(!cats.length){
    document.getElementById('pie-legend').innerHTML = '<span style="font-size:13px;color:var(--text-tertiary);">Sin gastos este mes</span>';
    return;
  }
  pieInst = new Chart(document.getElementById('pieChart'), {
    type:'doughnut',
    data:{ labels:cats, datasets:[{ data:cats.map(c=>bycat[c]), backgroundColor:cats.map(c=>CAT_COLORS[c]), borderWidth:2, borderColor:'rgba(255,255,255,0.25)' }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:ctx=>`${ctx.label}: ${fmtMoney(ctx.raw)}` }}}, cutout:'55%' }
  });
}

function renderBarChartResumen(){
  const md = getMonthData(viewMonth, viewYear).filter(e=>e.type==='gasto');
  const bycat = {};
  md.forEach(e=>{ bycat[e.cat] = (bycat[e.cat]||0) + e.amount; });
  const cats = Object.keys(bycat).sort((a,b)=>bycat[b]-bycat[a]);
  if(barInst) barInst.destroy();
  if(!cats.length) return;
  barInst = new Chart(document.getElementById('barChart'), {
    type:'bar',
    data:{ labels:cats, datasets:[{ data:cats.map(c=>bycat[c]), backgroundColor:cats.map(c=>CAT_COLORS[c]+'cc'), borderRadius:4 }] },
    options:{ responsive:true, maintainAspectRatio:false, indexAxis:'y',
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:ctx=>fmtMoney(ctx.raw) }}},
      scales:{ x:{ ticks:{ callback:v=>fmtMoney(v), font:{size:10} }, grid:{ color:'rgba(128,128,128,0.1)' }}, y:{ ticks:{ font:{size:11} }, grid:{ display:false }}}}
  });
}

/* ── EVOLUCIÓN ── */
function setRange(n, el){
  evoRange = n;
  document.querySelectorAll('.range-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderEvolucion();
}

function renderEvolucion(){
  const months = getMonthsBack(evoRange);
  const labels = months.map(({mo,yr}) => MONTHS_ES[mo].slice(0,3) + (yr!==now.getFullYear()?` '${String(yr).slice(2)}`:''));
  const totalGastos = months.map(({mo,yr}) => getMonthData(mo,yr).filter(e=>e.type==='gasto').reduce((s,e)=>s+e.amount,0));
  const totalIngresos = months.map(({mo,yr}) => getMonthData(mo,yr).filter(e=>e.type==='ingreso').reduce((s,e)=>s+e.amount,0));
  const balance = totalIngresos.map((inc,i) => inc - totalGastos[i]);

  if(evoGlobalInst) evoGlobalInst.destroy();
  evoGlobalInst = new Chart(document.getElementById('evoGlobalChart'), {
    type:'line',
    data:{ labels, datasets:[
      { label:'Ingresos', data:totalIngresos, borderColor:'#1D9E75', backgroundColor:'rgba(29,158,117,0.07)', tension:0.35, fill:true, pointBackgroundColor:'#1D9E75', pointRadius:4, borderWidth:2 },
      { label:'Gastos', data:totalGastos, borderColor:'#D85A30', backgroundColor:'rgba(216,90,48,0.07)', tension:0.35, fill:true, pointBackgroundColor:'#D85A30', pointRadius:4, borderWidth:2 },
      { label:'Balance', data:balance, borderColor:'#3266ad', backgroundColor:'transparent', tension:0.35, fill:false, pointBackgroundColor:'#3266ad', pointRadius:4, borderWidth:2, borderDash:[5,4] }
    ]},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:ctx=>`${ctx.dataset.label}: ${fmtMoney(ctx.raw)}` }}},
      scales:{ y:{ ticks:{ callback:v=>fmtMoney(v), font:{size:11} }, grid:{ color:'rgba(128,128,128,0.1)' }}, x:{ ticks:{ font:{size:11} }, grid:{display:false} }}}
  });

  const activeCats = ALL_GASTO_CATS.filter(cat =>
    months.some(({mo,yr}) => getMonthData(mo,yr).filter(e=>e.type==='gasto'&&e.cat===cat).length > 0)
  );

  const container = document.getElementById('cat-cards');
  container.innerHTML = '';
  Object.values(catChartInsts).forEach(c=>{ try{ c.destroy(); }catch(e){} });

  if(!activeCats.length){
    container.innerHTML = '<div class="empty-state">No hay gastos registrados en el período.</div>';
    return;
  }

  activeCats.forEach(cat => {
    const vals = months.map(({mo,yr}) => getMonthData(mo,yr).filter(e=>e.type==='gasto'&&e.cat===cat).reduce((s,e)=>s+e.amount,0));
    const total = vals.reduce((s,v)=>s+v,0);
    if(total === 0) return;
    const maxVal = Math.max(...vals);
    const color = CAT_COLORS[cat];
    const canvasId = `cat-chart-${cat.replace(/[\s\/]/g,'-')}`;
    const card = document.createElement('div');
    card.className = 'cat-card';
    card.innerHTML = `
      <div class="cat-card-header">
        <span class="cat-card-title"><span class="cat-dot" style="background:${color}"></span>${cat}</span>
        <span class="cat-card-total">${fmtMoney(total)} total</span>
      </div>
      <div style="position:relative;height:100px;"><canvas id="${canvasId}"></canvas></div>
      <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--text-tertiary);">
        <span>Prom: ${fmtMoney(Math.round(total/Math.max(vals.filter(v=>v>0).length,1)))}/mes</span>
        <span>Máx: ${fmtMoney(maxVal)}</span>
      </div>`;
    container.appendChild(card);
    requestAnimationFrame(() => {
      const canvas = document.getElementById(canvasId);
      if(!canvas) return;
      const inst = new Chart(canvas, {
        type:'line',
        data:{ labels, datasets:[
          { data:totalIngresos, borderColor:'rgba(29,158,117,0.22)', borderWidth:1, borderDash:[3,3], fill:false, pointRadius:0, tension:0.35 },
          { data:totalGastos, borderColor:'rgba(216,90,48,0.18)', borderWidth:1, borderDash:[3,3], fill:false, pointRadius:0, tension:0.35 },
          { data:vals, borderColor:color, backgroundColor:color+'18', tension:0.35, fill:true, pointBackgroundColor:color, pointRadius:3, borderWidth:2 }
        ]},
        options:{ responsive:true, maintainAspectRatio:false,
          plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:ctx => ctx.datasetIndex===2 ? `${cat}: ${fmtMoney(ctx.raw)}` : ctx.datasetIndex===0 ? `Ingresos: ${fmtMoney(ctx.raw)}` : `Gastos tot.: ${fmtMoney(ctx.raw)}` }}},
          scales:{ y:{ display:false }, x:{ ticks:{ font:{size:10} }, grid:{display:false} }}}
      });
      catChartInsts[canvasId] = inst;
    });
  });
}

/* ── VARIACIÓN ── */
function renderVariacion(){
  const months6 = getMonthsBack(6);
  const labels = months6.map(({mo}) => MONTHS_ES[mo].slice(0,3));
  const incomes = months6.map(({mo,yr}) => getMonthData(mo,yr).filter(e=>e.type==='ingreso').reduce((s,e)=>s+e.amount,0));
  const expenses = months6.map(({mo,yr}) => getMonthData(mo,yr).filter(e=>e.type==='gasto').reduce((s,e)=>s+e.amount,0));
  const balances = incomes.map((inc,i) => inc - expenses[i]);
  if(lineInst) lineInst.destroy();
  lineInst = new Chart(document.getElementById('lineChart'), {
    type:'line',
    data:{ labels, datasets:[
      { label:'Ingresos', data:incomes, borderColor:'#1D9E75', tension:0.3, fill:false, pointBackgroundColor:'#1D9E75', pointRadius:4 },
      { label:'Gastos', data:expenses, borderColor:'#D85A30', tension:0.3, fill:false, pointBackgroundColor:'#D85A30', pointRadius:4 },
      { label:'Balance', data:balances, borderColor:'#3266ad', tension:0.3, fill:false, pointBackgroundColor:'#3266ad', pointRadius:4, borderDash:[4,3] }
    ]},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:ctx=>`${ctx.dataset.label}: ${fmtMoney(ctx.raw)}` }}},
      scales:{ y:{ ticks:{ callback:v=>fmtMoney(v), font:{size:11} }, grid:{ color:'rgba(128,128,128,0.1)' }}, x:{ ticks:{ font:{size:11} }, grid:{display:false} }}}
  });
  if(balanceBarInst) balanceBarInst.destroy();
  balanceBarInst = new Chart(document.getElementById('balanceBarChart'), {
    type:'bar',
    data:{ labels, datasets:[{ label:'Balance', data:balances, backgroundColor:balances.map(b=>b>=0?'rgba(29,158,117,0.7)':'rgba(216,90,48,0.7)'), borderRadius:4 }] },
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:ctx=>`Balance: ${fmtMoney(ctx.raw)}` }}},
      scales:{ y:{ ticks:{ callback:v=>fmtMoney(v), font:{size:11} }, grid:{ color:'rgba(128,128,128,0.1)' }}, x:{ ticks:{ font:{size:11} }, grid:{display:false} }}}
  });
  document.getElementById('variacion-table').innerHTML = `
    <table>
      <thead><tr>
        <th>Mes</th>
        <th style="text-align:right;color:#1D9E75;">Ingresos</th>
        <th style="text-align:right;color:#D85A30;">Gastos</th>
        <th style="text-align:right;">Balance</th>
        <th style="text-align:right;">% gastado</th>
      </tr></thead>
      <tbody>${months6.map(({mo,yr},i) => {
        const bal = balances[i];
        const pct = incomes[i] > 0 ? Math.round(expenses[i]/incomes[i]*100) : 0;
        const bc = bal >= 0 ? '#085041' : '#791F1F';
        return `<tr>
          <td>${MONTHS_ES[mo]} ${yr}</td>
          <td style="text-align:right;color:#1D9E75;">${fmtMoney(incomes[i])}</td>
          <td style="text-align:right;color:#D85A30;">${fmtMoney(expenses[i])}</td>
          <td style="text-align:right;font-weight:500;color:${bc};">${bal>=0?'+':''}${fmtMoney(bal)}</td>
          <td style="text-align:right;color:${pct>100?'#A32D2D':pct>80?'#BA7517':'var(--text-secondary)'};">${pct}%</td>
        </tr>`;
      }).join('')}</tbody>
    </table>`;
}

/* ── DETALLE ── */
function renderExpensesList(){
  const md = getMonthData(detailMonth, detailYear);
  const cats = ['Todos', ...new Set(md.map(e=>e.cat)), 'Ingresos'];
  document.getElementById('filter-cats').innerHTML = cats.map(c =>
    `<button class="filter-chip ${activeFilter===c?'active':''}" onclick="setFilter('${c}')">${c}</button>`).join('');
  let filtered = md;
  if(activeFilter === 'Ingresos') filtered = md.filter(e=>e.type==='ingreso');
  else if(activeFilter !== 'Todos') filtered = md.filter(e=>e.cat===activeFilter);
  const sorted = [...filtered].sort((a,b) => new Date(b.date) - new Date(a.date));
  if(!sorted.length){
    document.getElementById('expenses-list').innerHTML = '<div class="empty-state">No hay registros este mes.<br>Usá "Agregar" para cargar tu primer movimiento.</div>';
    return;
  }
  document.getElementById('expenses-list').innerHTML = sorted.map(e => `
    <div class="expense-item">
      <div class="expense-left">
        <span class="expense-dot" style="background:${CAT_COLORS[e.cat]||'#888'}"></span>
        <div>
          <div class="expense-name">${e.desc}${e.note?` <span style="font-size:11px;color:var(--text-tertiary)">– ${e.note}</span>`:''}</div>
          <div class="expense-cat">${e.type==='ingreso'?'Ingreso · ':''}${e.cat}${e.subcat?' · '+e.subcat:''}</div>
        </div>
      </div>
      <div style="text-align:right;">
        <div class="${e.type==='ingreso'?'amt-pos':'amt-neg'}">${e.type==='ingreso'?'+':''}${fmtMoney(e.amount)}</div>
        <div class="expense-date">${new Date(e.date+'T00:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'short'})}</div>
      </div>
      <button class="delete-btn" onclick="deleteEntry(${e.id})" title="Eliminar">&#x2715;</button>
    </div>`).join('');
}

function setFilter(cat){ activeFilter = cat; renderExpensesList(); }

/* ── AGREGAR ── */
function setType(t){
  currentType = t;
  document.getElementById('btn-gasto').className = 'type-btn' + (t==='gasto'?' active-expense':'');
  document.getElementById('btn-ingreso').className = 'type-btn' + (t==='ingreso'?' active-income':'');
  const cats = t === 'gasto' ? Object.keys(SUBCATS_GASTO) : Object.keys(SUBCATS_INGRESO);
  document.getElementById('cat-select').innerHTML = '<option value="">Seleccionar...</option>' + cats.map(c=>`<option>${c}</option>`).join('');
  document.getElementById('subcat-select').innerHTML = '<option value="">Seleccionar categoría</option>';
}

function updateSubcats(){
  const cat = document.getElementById('cat-select').value;
  const sub = document.getElementById('subcat-select');
  const map = currentType === 'gasto' ? SUBCATS_GASTO : SUBCATS_INGRESO;
  if(!cat || !map[cat]){ sub.innerHTML = '<option value="">Seleccionar categoría</option>'; return; }
  sub.innerHTML = '<option value="">Sin subcategoría</option>' + map[cat].map(s=>`<option>${s}</option>`).join('');
}

function addEntry(){
  const desc = document.getElementById('desc').value.trim();
  const amount = parseFloat(document.getElementById('amount').value);
  const cat = document.getElementById('cat-select').value;
  const subcat = document.getElementById('subcat-select').value;
  const date = document.getElementById('date-input').value;
  const note = document.getElementById('note').value.trim();
  if(!desc || !amount || !cat || !date){ alert('Completá descripción, monto, categoría y fecha.'); return; }
  data.push({ id: Date.now(), type: currentType, desc, amount, cat, subcat, date, note });
  saveData(data);
  document.getElementById('desc').value = '';
  document.getElementById('amount').value = '';
  document.getElementById('cat-select').value = '';
  document.getElementById('subcat-select').innerHTML = '<option value="">Seleccionar categoría</option>';
  document.getElementById('note').value = '';
  showToast(currentType === 'gasto' ? 'Gasto guardado' : 'Ingreso guardado');
  switchTab('resumen');
}

function deleteEntry(id){
  if(!confirm('¿Eliminar este registro?')) return;
  data = data.filter(e => e.id !== id);
  saveData(data);
  renderExpensesList();
}

/* ── NAVEGACIÓN ── */
function updateMonthLabels(){
  document.getElementById('month-label').textContent = `${MONTHS_ES[viewMonth]} ${viewYear}`;
  document.getElementById('month-label-d').textContent = `${MONTHS_ES[detailMonth]} ${detailYear}`;
}
function changeMonth(dir){
  viewMonth += dir;
  if(viewMonth > 11){ viewMonth = 0; viewYear++; }
  if(viewMonth < 0){ viewMonth = 11; viewYear--; }
  updateMonthLabels(); renderResumen();
}
function changeMonthD(dir){
  detailMonth += dir;
  if(detailMonth > 11){ detailMonth = 0; detailYear++; }
  if(detailMonth < 0){ detailMonth = 11; detailYear--; }
  activeFilter = 'Todos';
  updateMonthLabels(); renderExpensesList();
}

function renderResumen(){ renderMetrics(); renderPieChart(); renderBarChartResumen(); }

function switchTab(tab){
  ['resumen','evolucion','variacion','detalle','add'].forEach(t => {
    document.getElementById('view-'+t).style.display = t===tab ? '' : 'none';
  });
  document.querySelectorAll('.tab').forEach((el,i) => {
    el.classList.toggle('active', ['resumen','evolucion','variacion','detalle','add'][i] === tab);
  });
  if(tab==='resumen') renderResumen();
  if(tab==='evolucion') renderEvolucion();
  if(tab==='variacion') renderVariacion();
  if(tab==='detalle') renderExpensesList();
  if(tab==='add') setType(currentType);
}

/* Init */
document.getElementById('date-input').value = now.toISOString().split('T')[0];
updateMonthLabels();
setType('gasto');
renderResumen();
</script>
</body>
</html>
